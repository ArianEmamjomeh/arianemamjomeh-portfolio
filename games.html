<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>things — arian emamjomeh</title>
    <link rel="icon" type="image/png" href="assets/iconlogo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=65">
</head>
<body class="games-page">
    <main>
        <header class="page-header">
            <h1 class="page-title"><em>things</em></h1>
        </header>

        <div class="games-filters">
            <button class="games-filter active" type="button" data-cat="all">games</button>
            <button class="games-filter" type="button" data-cat="competitive">competitive</button>
            <button class="games-filter" type="button" data-cat="animanga">animanga</button>
        </div>

        <div class="games-grid" id="games-grid">
            <div class="games-empty">loading games…</div>
        </div>
    </main>

    <div class="game-modal-scrim" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="game-modal">
            <button class="game-modal-close" aria-label="close">close ✕</button>
            <div class="game-modal-header">
                <div class="game-modal-cover-wrap">
                    <img class="game-modal-cover" alt="">
                </div>
                <div class="game-modal-info">
                    <h2 class="game-modal-title"></h2>
                    <div class="game-modal-stars"></div>
                    <div class="game-modal-meta"></div>
                    <div class="game-modal-rank" hidden>
                        <img class="modal-rank-img" alt="">
                        <span>Peak Rank: <span class="modal-rank-name"></span></span>
                    </div>
                    <div class="game-modal-completed" hidden>🏆 100% completed</div>
                </div>
            </div>
            <div class="game-modal-note-wrap" hidden>
                <div class="game-modal-note-label">thoughts</div>
                <div class="game-modal-note"></div>
            </div>
            <div class="game-modal-achievements" hidden>
                <div class="ach-banner">
                    <svg class="ach-banner-medal" viewBox="0 0 36 40" aria-hidden="true">
                        <path d="M18 24l-6 14 6-4 6 4-6-14z" fill="#4a8ee0" stroke="#1f4a86" stroke-width="0.8"/>
                        <circle cx="18" cy="14" r="11" fill="#f2c04b" stroke="#b88a1f" stroke-width="1"/>
                        <path d="M14 14l3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <div class="ach-banner-text">
                        <div class="ach-banner-title"></div>
                        <div class="ach-banner-sub"></div>
                        <div class="ach-banner-bar"><div class="ach-banner-bar-fill"></div></div>
                    </div>
                </div>
                <div class="game-modal-ach-grid"></div>
            </div>
            <div class="ach-tooltip" role="tooltip" aria-hidden="true">
                <img class="tt-icon" alt="">
                <div class="tt-body">
                    <div class="tt-name"></div>
                    <div class="tt-desc"></div>
                    <div class="tt-stats">
                        <div class="tt-date"></div>
                        <div class="tt-rarity"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js?v=59"></script>
</body>
</html>
